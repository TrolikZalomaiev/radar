<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Radar Final Monitor</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background: #000; color: #fff; }
        #displayNode {
            width: 100%; height: 160px; margin: 15px 0; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a1a; border: 4px solid #333; transition: 0.2s;
        }
        #statusText { font-size: 32px; font-weight: 900; }
        .state-ready { color: #888; border-color: #444 !important; }
        .state-clear { background: #062d19 !important; border-color: #2ecc71 !important; color: #2ecc71; }
        .state-warning { background: #4d0000 !important; border-color: #ff4d4d !important; color: #ff4d4d; animation: pulse 0.4s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        button { width: 100%; padding: 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; margin-bottom: 10px; text-transform: uppercase; }
        #unlock { background: #444; color: white; }
        #connect { background: #007bff; color: white; }
        #log { text-align: left; height: 150px; overflow-y: auto; background: #050505; padding: 10px; font-size: 11px; border: 1px solid #222; color: #0f0; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="displayNode" class="state-ready">
        <div id="statusText">OFFLINE</div>
        <div id="subStatus" style="font-size:12px; margin-top:10px; opacity:0.6;">Нажми кнопки ниже</div>
    </div>

    <button id="unlock">1. Включить звук</button>
    <button id="connect">2. Подключить радар</button>

    <div id="log">Лог системы:<br></div>

<script>
    const connectBtn = document.getElementById('connect');
    const unlockBtn = document.getElementById('unlock');
    const display = document.getElementById('displayNode');
    const statusText = document.getElementById('statusText');
    const subStatus = document.getElementById('subStatus');
    const logDiv = document.getElementById('log');

    let audioCtx = null;
    const SERVICE_UUID = '8ce5cc01-0a4d-11e9-ab14-d663bd873d93';

    function log(msg) {
        logDiv.innerHTML += `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function playAlert(isCritical) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = isCritical ? 'sawtooth' : 'sine';
        osc.frequency.value = isCritical ? 1200 : 800;
        gain.gain.setValueAtTime(isCritical ? 0.7 : 0.01, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        if (isCritical && navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }

    unlockBtn.onclick = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        unlockBtn.style.background = "#2ecc71";
        statusText.innerText = "READY";
        log("Звук активирован");
    };

    connectBtn.onclick = async () => {
        try {
            log("Поиск...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            log("Связь установлена!");
            playAlert(true);

            const service = await server.getPrimaryService(SERVICE_UUID);
            const chars = await service.getCharacteristics();
            log("Найдено каналов: " + chars.length);

            for (let char of chars) {
                // Подключаемся ко ВСЕМ характеристикам, которые умеют слать данные
                if (char.properties.notify) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => {
                        const data = e.target.value;
                        let hex = "";
                        let car = false;

                        for (let i = 0; i < data.byteLength; i++) {
                            let v = data.getUint8(i);
                            hex += v.toString(16).padStart(2, '0') + " ";
                            // Если в любом байте, кроме первого, что-то есть - это машина
                            if (i > 0 && v > 0) car = true;
                        }

                        if (car) {
                            display.className = "state-warning";
                            statusText.innerText = "МАШИНА! 🚗";
                            playAlert(true);
                        } else {
                            display.className = "state-clear";
                            statusText.innerText = "ЧИСТО ✅";
                        }
                        subStatus.innerText = "Данные: " + hex;
                    });
                    log("Слушаю канал: " + char.uuid.substring(0,8));
                }
            }
            
            // Если все ок, переключаем экран в зеленый режим ожидания
            display.className = "state-clear";
            statusText.innerText = "ЧИСТО ✅";
            subStatus.innerText = "Радар на связи, машин нет";

        } catch (e) { 
            log("ОШИБКА: " + e.message); 
            statusText.innerText = "ОШИБКА";
            display.className = "state-ready";
        }
    };
</script>
</body>
</html>
