<!DOCTYPE html>
<html>
<head>
    <title>Magene Radar PRO</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 15px; background: #000; color: #fff; }
        #display {
            width: 100%; height: 180px; margin: 15px 0; border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: #1a1a1a; border: 4px solid #333; transition: 0.1s;
        }
        #statusText { font-size: 40px; font-weight: 900; }
        .state-clear { background: #062d19 !important; border-color: #2ecc71 !important; color: #2ecc71; }
        .state-warning { background: #4d0000 !important; border-color: #ff4d4d !important; color: #ff4d4d; animation: blink 0.4s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        button { width: 100%; padding: 20px; font-size: 16px; font-weight: bold; cursor: pointer; border-radius: 12px; border: none; margin-bottom: 10px; }
        #log { text-align: left; height: 160px; overflow-y: auto; background: #050505; padding: 10px; font-size: 11px; border: 1px solid #222; color: #0f0; border-radius: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div id="display">
        <div id="statusText">ОЖИДАНИЕ</div>
        <div id="subStatus" style="font-size:14px; margin-top:10px; font-family: monospace;">Данные появятся тут</div>
    </div>
    <button id="unlock" style="background:#444; color:#fff;">1. РАЗРЕШИТЬ ЗВУК</button>
    <button id="connect" style="background:#007bff; color:#fff;">2. ПОДКЛЮЧИТЬ И ВКЛЮЧИТЬ</button>
    <div id="log">--- LOG ---<br></div>

<script>
    const connectBtn = document.getElementById('connect');
    const unlockBtn = document.getElementById('unlock');
    const display = document.getElementById('display');
    const statusText = document.getElementById('statusText');
    const subStatus = document.getElementById('subStatus');
    const logDiv = document.getElementById('log');

    let audioCtx = null;
    let lastLogData = "";
    let isWarningActive = false;

    function log(msg) {
        logDiv.innerHTML += `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function playAlert() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(1500, audioCtx.currentTime);
        gain.gain.setValueAtTime(1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
        
        osc.start();
        osc.stop(audioCtx.currentTime + 0.4);
        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }

    unlockBtn.onclick = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        audioCtx.resume();
        unlockBtn.style.background = "#2ecc71";
        unlockBtn.innerText = "ЗВУК ГОТОВ ✅";
        log("Аудио запущено");
    };

    connectBtn.onclick = async () => {
        if (!audioCtx) return alert("Сначала нажми кнопку 1!");
        try {
            log("Поиск радара...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['8ce5cc01-0a4d-11e9-ab14-d663bd873d93']
            });

            const server = await device.gatt.connect();
            log("Подключено!");

            const service = await server.getPrimaryService('8ce5cc01-0a4d-11e9-ab14-d663bd873d93');
            const chars = await service.getCharacteristics();

            for (let char of chars) {
                // Активация передачи данных
                if (char.properties.write || char.properties.writeWithoutResponse) {
                    try {
                        await char.writeValue(new Uint8Array([0x01, 0x00]));
                        log("Активация отправлена на: " + char.uuid.substring(0,8));
                    } catch(e) {}
                }

                // Чтение данных
                if (char.properties.notify) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => {
                        let raw = new Uint8Array(e.target.value.buffer);
                        let hex = Array.from(raw).map(b => b.toString(16).padStart(2, '0')).join(' ');
                        
                        subStatus.innerText = hex;
                        
                        // Логируем уникальные пакеты, чтобы видеть, что шлет радар
                        if (hex !== lastLogData) {
                            log("ПАКЕТ: " + hex);
                            lastLogData = hex;
                        }
                        
                        // ЛОГИКА ДЕТЕКТОРА МАШИН:
                        // Если пакет длиннее 3 байт (добавились данные о цели) 
                        // ИЛИ второй байт больше нуля (количество целей > 0)
                        let hasCar = false;
                        if (raw.length > 3 || (raw.length >= 2 && raw[1] > 0)) {
                            hasCar = true;
                        }

                        if (hasCar) {
                            display.className = "state-warning";
                            statusText.innerText = "МАШИНА! 🚗";
                            if (!isWarningActive) {
                                playAlert(); // Пищим только один раз при появлении новой цели
                                isWarningActive = true;
                            }
                        } else {
                            display.className = "state-clear";
                            statusText.innerText = "ЧИСТО ✅";
                            isWarningActive = false; // Сбрасываем триггер
                        }
                    });
                }
            }
        } catch (e) { log("Ошибка: " + e.message); }
    };
</script>
</body>
</html>
