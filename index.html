<!DOCTYPE html>
<html>
<head>
    <title>Magene C606 Bridge</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; padding: 20px; }
        #log { height: 450px; overflow-y: auto; text-align: left; background: #111; padding: 10px; border: 1px solid #333; margin-top: 20px; font-size: 11px; }
        button { padding: 20px; background: #27ae60; color: white; border: none; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>ВЗЛОМ ЧЕРЕЗ C606 📡</h2>
    <button id="scan">ПОДКЛЮЧИТЬСЯ К ВЕЛОКОМПУ</button>
    <div id="log">1. Включи радар и C606<br>2. Убедись, что они видят друг друга<br>3. Нажми кнопку выше и выбери C606...<br></div>

<script>
    const logDiv = document.getElementById('log');
    function log(m) { logDiv.innerHTML += `> ${m}<br>`; logDiv.scrollTop = logDiv.scrollHeight; }

    document.getElementById('scan').onclick = async () => {
        try {
            log("Ищу C606...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '0000183a-0000-1000-8000-00805f9b34fb', // Стандартный радар
                    '00001812-0000-1000-8000-00805f9b34fb', // HID
                    '6e400001-b5a3-f393-e0a9-e50e24dcca9e'  // Nordic UART (часто у Magene)
                ]
            });
            
            const server = await device.gatt.connect();
            log("ЕСТЬ КОНТАКТ С C606!");
            
            const services = await server.getPrimaryServices();
            for (let service of services) {
                log("Сервис: " + service.uuid.substring(0,8));
                const chars = await service.getCharacteristics();
                for (let char of chars) {
                    if (char.properties.notify || char.properties.indicate) {
                        try {
                            await char.startNotifications();
                            char.addEventListener('characteristicvaluechanged', (e) => {
                                let hex = Array.from(new Uint8Array(e.target.value.buffer))
                                             .map(b => b.toString(16).padStart(2, '0')).join(' ');
                                log(`[${char.uuid.substring(0,4)}] ДАННЫЕ: ${hex}`);
                            });
                        } catch(e) {}
                    }
                }
            }
            log("Слушаю все каналы C606. Машины должны отображаться здесь!");
        } catch (e) { log("Ошибка: " + e); }
    };
</script>
</body>
</html>
