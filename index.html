<!DOCTYPE html>
<html>
<head>
    <title>Magene Radar PRO</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        button { width: 100%; padding: 25px; font-size: 20px; margin-bottom: 15px; cursor: pointer; border-radius: 15px; border: none; font-weight: bold; }
        #unlock { background: #444; color: #fff; }
        #connect { background: #007bff; color: #fff; }
        #status { margin: 20px 0; padding: 40px; border-radius: 25px; font-size: 35px; font-weight: 900; background: #111; border: 3px solid #333; }
        .warning { background: #e74c3c !important; border-color: #fff !important; }
        #log { font-family: monospace; font-size: 11px; color: #0f0; text-align: left; height: 180px; overflow-y: auto; background: #050505; padding: 10px; border-radius: 10px; border: 1px solid #222; }
    </style>
</head>
<body>
    <h1>MAGENE RADAR</h1>
    <button id="unlock">1. ВКЛЮЧИТЬ ЗВУК И ВИБРО</button>
    <button id="connect">2. ПОДКЛЮЧИТЬ</button>
    <div id="status">ОЖИДАНИЕ</div>
    <div id="log">--- LOG START ---<br></div>

<script>
    const connectBtn = document.getElementById('connect');
    const unlockBtn = document.getElementById('unlock');
    const statusBox = document.getElementById('status');
    const logDiv = document.getElementById('log');

    let audioCtx = null;
    const SERVICE_UUID = '8ce5cc01-0a4d-11e9-ab14-d663bd873d93';

    function log(msg) {
        logDiv.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function playAlert() {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'square';
        osc.frequency.value = 1000;
        gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
    }

    unlockBtn.onclick = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        unlockBtn.style.background = "#2ecc71";
        unlockBtn.innerText = "ЗВУК ГОТОВ ✅";
        log("Аудио-движок запущен");
    };

    connectBtn.onclick = async () => {
        if (!audioCtx) return alert("Сначала нажми кнопку 1!");
        try {
            log("Запрос устройства...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            log("Коннект к " + device.name);
            const server = await device.gatt.connect();
            
            // Писк при успешном коннекте
            playAlert();

            const service = await server.getPrimaryService(SERVICE_UUID);
            const chars = await service.getCharacteristics();
            log("Найдено характеристик: " + chars.length);

            for (let char of chars) {
                if (char.properties.notify) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => {
                        const data = e.target.value;
                        let hex = "";
                        let hasCar = false;
                        
                        for (let i = 0; i < data.byteLength; i++) {
                            let v = data.getUint8(i);
                            hex += v.toString(16).padStart(2, '0') + " ";
                            // Радары Magene обычно шлют флаг цели во 2-м или 3-м байте
                            if (i > 0 && v > 0) hasCar = true;
                        }
                        
                        log("DATA: " + hex);

                        if (hasCar) {
                            statusBox.innerText = "МАШИНА! 🚗";
                            statusBox.className = "warning";
                            playAlert();
                        } else {
                            statusBox.innerText = "ЧИСТО ✅";
                            statusBox.className = "clear";
                        }
                    });
                    log("Слушаю Notify на: " + char.uuid.substring(0,8));
                }
            }
            statusBox.innerText = "АКТИВЕН";
            statusBox.className = "clear";

        } catch (e) {
            log("ОШИБКА: " + e.message);
        }
    };
</script>
</body>
</html>
