<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Magene Radar Web Controller</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #121212; 
            color: white; 
        }
        .container { max-width: 400px; margin: 0 auto; }
        h1 { color: #007bff; margin-bottom: 30px; }
        
        button { 
            width: 100%;
            padding: 20px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 15px; 
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: #444; }

        #statusBox {
            margin-top: 20px;
            padding: 30px;
            border-radius: 15px;
            background: #1e1e1e;
            font-size: 24px;
            font-weight: bold;
        }
        
        .clear { color: #28a745; border: 2px solid #28a745; }
        .warning { color: #dc3545; border: 2px solid #dc3545; animation: blink 0.5s infinite; }
        
        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        #log { 
            margin-top: 20px; 
            font-size: 12px; 
            color: #666; 
            text-align: left; 
            height: 100px; 
            overflow-y: auto; 
            background: #000;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Magene Radar</h1>
    
    <button id="unlockAudio">1. ВКЛЮЧИТЬ ЗВУК</button>
    <button id="connect">2. ПОДКЛЮЧИТЬ РАДАР</button>
    
    <div id="statusBox">Ожидание...</div>
    
    <div id="log">Логи системы:<br></div>
</div>

<script>
    const connectBtn = document.getElementById('connect');
    const unlockBtn = document.getElementById('unlockAudio');
    const statusBox = document.getElementById('statusBox');
    const logDiv = document.getElementById('log');

    let audioCtx = null;

    // Функция логирования для отладки на телефоне
    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `[${time}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    // Разблокировка звука (обязательно для браузеров)
    unlockBtn.onclick = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        unlockBtn.style.background = "#28a745";
        unlockBtn.innerText = "ЗВУК ГОТОВ ✅";
        log("Аудио активировано");
    };

    function playAlertSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'sawtooth'; // Более резкий звук для дороги
        osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.3);
    }

    connectBtn.onclick = async () => {
        try {
            log("Запрос Bluetooth устройств...");
            
            // acceptAllDevices помогает избежать SecurityError из-за blocklisted UUID
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: ['00001812-0000-1000-8000-00805f9b34fb']
            });

            log("Подключение к: " + device.name);
            const server = await device.gatt.connect();
            
            log("Поиск сервиса...");
            const service = await server.getPrimaryService('00001812-0000-1000-8000-00805f9b34fb');
            
            log("Подписка на данные...");
            const chars = await service.getCharacteristics();
            
            for (let char of chars) {
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (event) => {
                    const val = event.target.value.getUint8(0);
                    if (val > 0) {
                        statusBox.innerText = "МАШИНА! 🚗";
                        statusBox.className = "warning";
                        playAlertSound();
                    } else {
                        statusBox.innerText = "ЧИСТО ✅";
                        statusBox.className = "clear";
                    }
                });
            }
            
            statusBox.innerText = "РАБОТАЕТ";
            statusBox.className = "clear";
            connectBtn.disabled = true;
            log("Система готова!");

        } catch (e) {
            log("ОШИБКА: " + e);
            statusBox.innerText = "Ошибка!";
        }
    };
</script>

</body>
</html>
