<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magene Radar Ultimate Sniffer</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #050505; color: #00ff00; padding: 20px; margin: 0; }
        #display { 
            height: 150px; border: 2px solid #00ff00; border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; font-weight: bold; margin-bottom: 20px;
            background: #0a0a0a; transition: 0.3s;
        }
        .alert { background: #aa0000; color: #fff; border-color: #ff0000; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        
        button { 
            width: 100%; padding: 20px; background: #00ff00; color: #000; 
            border: none; border-radius: 10px; font-weight: bold; font-size: 18px; cursor: pointer;
        }
        #log { 
            height: 400px; overflow-y: auto; border: 1px solid #222; 
            background: #000; padding: 10px; margin-top: 20px; font-size: 12px;
        }
        .msg-change { color: #fff; background: #333; padding: 2px 0; }
    </style>
</head>
<body>

    <div id="displayTextText">СТАТУС: ОЖИДАНИЕ</div>
    <div id="display" class="normal">ПОИСК МАШИН...</div>
    <button id="connectBtn">ПОДКЛЮЧИТЬ И ВЗЛОМАТЬ 📡</button>
    <div id="log">Лог событий:<br></div>

<script>
    const logDiv = document.getElementById('log');
    const display = document.getElementById('display');
    const statusText = document.getElementById('displayTextText');
    
    // Все возможные UUID Magene для радаров серии L508/L308
    const OPTIONAL_SERVICES = [
        '8ce5cc01-0a4d-11e9-ab14-d663bd873d93', // Основной (Свет)
        '8ce5cc02-0a4d-11e9-ab14-d663bd873d93', // Радарный поток
        '6e400001-b5a3-f393-e0a9-e50e24dcca9e', // UART (Nordic)
        '0000183a-0000-1000-8000-00805f9b34fb'  // Стандартный радар
    ];

    let lastData = {};

    function log(m, isChange = false) {
        const time = new Date().toLocaleTimeString();
        const html = `<div><span style="color:#555">[${time}]</span> ${isChange ? '<span class="msg-change">'+m+'</span>' : m}</div>`;
        logDiv.innerHTML += html;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function beep() {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        osc.type = 'square';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        osc.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + 0.15);
    }

    document.getElementById('connectBtn').onclick = async () => {
        try {
            statusText.innerText = "СТАТУС: ПОИСК...";
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: OPTIONAL_SERVICES
            });

            log(`Подключение к ${device.name}...`);
            const server = await device.gatt.connect();
            statusText.innerText = "СТАТУС: ПОДКЛЮЧЕНО";

            const services = await server.getPrimaryServices();
            log(`Найдено сервисов: ${services.length}`);

            for (let service of services) {
                log(`Взламываю сервис: ${service.uuid.substring(0,8)}...`);
                const chars = await service.getCharacteristics();

                for (let char of chars) {
                    // 1. Отправляем ключи активации в каждый пишущий канал
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        try {
                            const keys = [
                                new Uint8Array([0x05, 0x01, 0x02, 0x02, 0x01, 0x03, 0x0e]),
                                new Uint8Array([0x05, 0x01, 0x03, 0x01, 0x01, 0x01, 0x03, 0x0f])
                            ];
                            for (let k of keys) await char.writeValue(k);
                            log(`Ключи отправлены в ${char.uuid.substring(0,4)}`);
                        } catch(e) {}
                    }

                    // 2. Подписываемся на ВСЕ уведомления
                    if (char.properties.notify || char.properties.indicate) {
                        try {
                            await char.startNotifications();
                            char.addEventListener('characteristicvaluechanged', (e) => {
                                const hex = Array.from(new Uint8Array(e.target.value.buffer))
                                               .map(b => b.toString(16).padStart(2, '0')).join(' ');
                                
                                const cid = char.uuid.substring(0,4);
                                
                                // Если данные в этом канале изменились
                                if (lastData[cid] !== hex) {
                                    lastData[cid] = hex;
                                    log(`КАНАЛ ${cid} ОБНОВЛЕН: ${hex}`, true);
                                    
                                    // Если это НЕ стандартный пульс света 57 0a...
                                    if (!hex.startsWith("57 0a")) {
                                        display.innerText = "МАШИНА / СОБЫТИЕ!";
                                        display.className = "alert";
                                        beep();
                                        setTimeout(() => {
                                            display.className = "normal";
                                            display.innerText = "ПОИСК МАШИН...";
                                        }, 2000);
                                    }
                                }
                            });
                            log(`Слушаю канал ${char.uuid.substring(0,4)}`);
                        } catch(e) {}
                    }
                }
            }
            log("--- ВСЕ КАНАЛЫ ПОД КОНТРОЛЕМ. Жду машину! ---");

        } catch (e) {
            log("ОШИБКА: " + e);
            statusText.innerText = "СТАТУС: ОШИБКА";
        }
    };
</script>
</body>
</html>
