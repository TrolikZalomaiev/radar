<!DOCTYPE html>
<html>
<head>
    <title>Magene Radar Web</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #121212; color: white; }
        button { padding: 20px 40px; font-size: 20px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 10px; }
        #status { margin-top: 20px; font-size: 18px; color: #aaa; }
    </style>
</head>
<body>
    <h1>Radar Controller</h1>
    <button id="connect">CONNECT RADAR</button>
    <div id="status">Status: Disconnected</div>

    <script>
        const connectBtn = document.getElementById('connect');
        const statusDiv = document.getElementById('status');
        
        // Аудио контекст (нужен для звука в браузере)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function beep() {
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.type = 'square';
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }

        connectBtn.addEventListener('click', async () => {
            try {
                statusDiv.innerText = "Searching...";
                
                // Просим браузер найти устройство
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'L508' }, { services: ['00001812-0000-1000-8000-00805f9b34fb'] }],
                    optionalServices: ['00001812-0000-1000-8000-00805f9b34fb']
                });

                const server = await device.gatt.connect();
                statusDiv.innerText = "Connected to " + device.name;
                beep(); // Пищим при коннекте

                // Ищем сервис и характеристику (как в коде Android)
                const service = await server.getPrimaryService('00001812-0000-1000-8000-00805f9b34fb');
                const characteristics = await service.getCharacteristics();

                for (let char of characteristics) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (event) => {
                        const value = event.target.value;
                        if (value.getUint8(0) > 0) {
                            statusDiv.innerHTML = "<h2 style='color:red'>CAR BEHIND!</h2>";
                            beep();
                        } else {
                            statusDiv.innerHTML = "<h2 style='color:green'>CLEAR</h2>";
                        }
                    });
                }

            } catch (error) {
                statusDiv.innerText = "Error: " + error;
                console.error(error);
            }
        });
    </script>
</body>
</html>
