<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magene Radar: Final Spy</title>
    <style>
        body { font-family: monospace; background: #000; color: #00ff00; padding: 15px; margin: 0; }
        #display { 
            width: 100%; height: 120px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; 
            background: #111; border: 2px solid #333; margin-bottom: 15px;
            font-size: 20px; text-align: center;
        }
        .alarm { background: #600 !important; border-color: #f00 !important; color: #fff !important; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }
        
        button { 
            width: 100%; padding: 20px; font-size: 16px; font-weight: bold; 
            background: #0055ff; color: white; border: none; border-radius: 10px; cursor: pointer;
        }
        #log { 
            height: 400px; overflow-y: auto; background: #050505; 
            padding: 10px; font-size: 11px; border: 1px solid #222; margin-top: 15px;
        }
        .packet { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }
        .new-data { color: #fff; background: #d35400; font-weight: bold; }
    </style>
</head>
<body>

    <div id="display" class="idle">ОЖИДАНИЕ ПОДКЛЮЧЕНИЯ</div>
    <button id="start">ЗАПУСТИТЬ ПОЛНЫЙ СКАН 📡</button>
    <div id="log">Лог событий:<br></div>

<script>
    const logDiv = document.getElementById('log');
    const display = document.getElementById('display');
    const SERVICE_UUID = '8ce5cc01-0a4d-11e9-ab14-d663bd873d93';
    let lastValues = {}; 

    function log(msg, isChange = false) {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.className = 'packet';
        div.innerHTML = `[${time}] ${isChange ? '<span class="new-data">' + msg + '</span>' : msg}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function beep() {
        try {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            osc.connect(ctx.destination);
            osc.frequency.value = 800;
            osc.start();
            osc.stop(ctx.currentTime + 0.15);
        } catch(e) {}
    }

    document.getElementById('start').onclick = async () => {
        try {
            log("Поиск радара...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            log("Подключено! Вскрываю сервисы...");

            // Берем вообще ВСЕ доступные сервисы устройства
            const services = await server.getPrimaryServices();
            log(`Найдено сервисов: ${services.length}`);

            // Ключи активации (отправляем во все возможные дыры)
            const keys = [
                new Uint8Array([0x05, 0x01, 0x02, 0x02, 0x01, 0x03, 0x0e]),
                new Uint8Array([0x05, 0x01, 0x03, 0x01, 0x01, 0x01, 0x03, 0x0f])
            ];

            for (let service of services) {
                const chars = await service.getCharacteristics();
                for (let char of chars) {
                    // 1. Пробуем записать пароли
                    if (char.properties.write || char.properties.writeWithoutResponse) {
                        for (let key of keys) {
                            await char.writeValue(key).catch(() => {});
                        }
                    }

                    // 2. Подписываемся на ВСЕ уведомления
                    if (char.properties.notify || char.properties.indicate) {
                        try {
                            await char.startNotifications();
                            char.addEventListener('characteristicvaluechanged', (e) => {
                                let hex = Array.from(new Uint8Array(e.target.value.buffer))
                                               .map(b => b.toString(16).padStart(2, '0')).join(' ');
                                
                                let charId = char.uuid.substring(0, 4);

                                // Выводим данные, только если они изменились
                                if (lastValues[charId] !== hex) {
                                    lastValues[charId] = hex;
                                    log(`ID:${charId} -> ${hex}`, true);
                                    
                                    // Если это не стандартный пульс покоя
                                    if (hex !== "01 00 06") {
                                        display.className = "alarm";
                                        display.innerText = "ИЗМЕНЕНИЕ ЭФИРА!";
                                        beep();
                                        setTimeout(() => {
                                            display.className = "";
                                            display.innerText = "СЛУШАЮ...";
                                        }, 1000);
                                    }
                                }
                            });
                            log(`Канал ${char.uuid.substring(0,4)}: СЛУШАЮ`);
                        } catch(e) {}
                    }
                }
            }
            display.innerText = "СИСТЕМА АКТИВНА";
            log("--- СКАНЕР ЗАПУЩЕН. Жми Warning Light! ---");

        } catch (e) {
            log("ОШИБКА: " + e);
        }
    };
</script>
</body>
</html>
