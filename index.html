<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Magene Radar Hacker Edition</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            background: #0a0a0a; 
            color: #e0e0e0; 
        }
        .container { max-width: 450px; margin: 0 auto; }
        h1 { color: #007bff; font-size: 24px; }
        
        button { 
            width: 100%;
            padding: 18px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            margin-bottom: 12px;
            transition: 0.2s;
        }
        button:active { background: #0056b3; transform: translateY(2px); }
        #unlockAudio { background: #6c757d; }
        
        #statusBox {
            margin: 20px 0;
            padding: 40px 20px;
            border-radius: 20px;
            background: #1a1a1a;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            border: 2px solid #333;
        }
        
        .clear { color: #2ecc71; border-color: #2ecc71 !important; }
        .warning { 
            color: #e74c3c; 
            border-color: #e74c3c !important; 
            animation: pulse 0.4s infinite;
            background: #2c1a1a !important;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        #log { 
            margin-top: 15px; 
            font-family: monospace;
            font-size: 11px; 
            color: #00ff00; 
            text-align: left; 
            height: 150px; 
            overflow-y: auto; 
            background: #000;
            padding: 10px;
            border: 1px solid #333;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>MAGENE L508 RADAR</h1>
    
    <button id="unlockAudio">1. АКТИВИРОВАТЬ ЗВУК</button>
    <button id="connect">2. ПОИСК И ПОДКЛЮЧЕНИЕ</button>
    
    <div id="statusBox">ОТКЛЮЧЕНО</div>
    
    <div id="log">--- LOG START ---<br></div>
</div>

<script>
    const connectBtn = document.getElementById('connect');
    const unlockBtn = document.getElementById('unlockAudio');
    const statusBox = document.getElementById('statusBox');
    const logDiv = document.getElementById('log');

    let audioCtx = null;

    function log(msg) {
        const time = new Date().toLocaleTimeString();
        logDiv.innerHTML += `[${time}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    unlockBtn.onclick = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        unlockBtn.style.background = "#2ecc71";
        unlockBtn.innerText = "ЗВУК ГОТОВ ✅";
        log("Аудио-движок запущен");
    };

    function playAlert() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'square'; 
        osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.25);
    }

    connectBtn.onclick = async () => {
        try {
            log("Запрос Bluetooth (все устройства)...");
            
            // Запрашиваем доступ ко ВСЕМ устройствам, но объявляем интерес к сервисам радара
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '00001812-0000-1000-8000-00805f9b34fb', // Основной (HID/Radar)
                    '0000180f-0000-1000-8000-00805f9b34fb', // Батарея
                    '0000180a-0000-1000-8000-00805f9b34fb'  // Инфо
                ]
            });

            log("Подключение к: " + device.name);
            const server = await device.gatt.connect();
            
            log("Поиск разрешенных сервисов...");
            // Вместо одного сервиса берем все, что разрешил Chrome
            const services = await server.getPrimaryServices();
            log("Доступно сервисов: " + services.length);

            let activeChars = 0;

            for (let service of services) {
                log("Изучаю сервис: " + service.uuid);
                const chars = await service.getCharacteristics();
                
                for (let char of chars) {
                    // Ищем характеристику, которая умеет слать уведомления (Notify)
                    if (char.properties.notify) {
                        await char.startNotifications();
                        char.addEventListener('characteristicvaluechanged', (event) => {
                            const data = event.target.value;
                            // Если первый байт > 0, значит есть цель
                            const carDetected = data.getUint8(0) > 0;
                            
                            if (carDetected) {
                                statusBox.innerText = "МАШИНА! 🚗";
                                statusBox.className = "warning";
                                playAlert();
                            } else {
                                statusBox.innerText = "ЧИСТО ✅";
                                statusBox.className = "clear";
                            }
                        });
                        log("Подписка активна: " + char.uuid.substring(0,8));
                        activeChars++;
                    }
                }
            }
            
            if (activeChars > 0) {
                statusBox.innerText = "ГОТОВО";
                statusBox.className = "clear";
                connectBtn.innerText = "РАДАР ПОДКЛЮЧЕН";
                connectBtn.disabled = true;
                log("Успешно! Махай рукой перед радаром.");
            } else {
                log("Ошибка: Нужные характеристики не найдены.");
            }

        } catch (e) {
            log("КРИТИЧЕСКАЯ ОШИБКА: " + e.message);
            statusBox.innerText = "ОШИБКА СВЯЗИ";
        }
    };
</script>

</body>
</html>
