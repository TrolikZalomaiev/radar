<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Magene Raw Data Trace</title>
    <style>
        body { font-family: monospace; background: #000; color: #00ff00; padding: 15px; }
        #log { 
            width: 100%; height: 500px; overflow-y: auto; 
            border: 1px solid #333; background: #050505; 
            padding: 10px; margin-top: 10px; font-size: 12px;
        }
        button { 
            width: 100%; padding: 20px; background: #222; color: #0f0; 
            border: 1px solid #0f0; font-weight: bold; cursor: pointer;
        }
        .change { color: #fff; background: #d35400; padding: 0 2px; }
        .service-info { color: #888; font-size: 10px; }
    </style>
</head>
<body>
    <button id="connectBtn">ПОДКЛЮЧИТЬ И ЗАПИСЫВАТЬ ВСЁ</button>
    <div id="log">Ожидание подключения...<br></div>

<script>
    const logDiv = document.getElementById('log');
    const SERVICE_UUID = '8ce5cc01-0a4d-11e9-ab14-d663bd873d93';
    let lastValues = {}; // Хранилище для сравнения изменений

    function log(msg, isChange = false) {
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.innerHTML = `<span class="service-info">[${time}]</span> ${isChange ? '<span class="change">' + msg + '</span>' : msg}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('connectBtn').onclick = async () => {
        try {
            log("Запрос устройства...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            log("Соединение установлено.");
            
            const service = await server.getPrimaryService(SERVICE_UUID);
            const chars = await service.getCharacteristics();
            log(`Найдено характеристик: ${chars.length}. Начинаю подписку...`);

            // Взлом (отправка ключей, чтобы открыть потоки данных)
            const keys = [
                new Uint8Array([0x05, 0x01, 0x02, 0x02, 0x01, 0x03, 0x0e]),
                new Uint8Array([0x05, 0x01, 0x03, 0x01, 0x01, 0x01, 0x03, 0x0f])
            ];

            for (let char of chars) {
                if (char.properties.write) {
                    for (let key of keys) await char.writeValue(key).catch(()=>{});
                }
            }

            // ПОДПИСЫВАЕМСЯ НА ВСЁ
            for (let char of chars) {
                if (char.properties.notify || char.properties.indicate) {
                    try {
                        await char.startNotifications();
                        char.addEventListener('characteristicvaluechanged', (e) => {
                            let hex = Array.from(new Uint8Array(e.target.value.buffer))
                                           .map(b => b.toString(16).padStart(2, '0')).join(' ');
                            
                            let charId = char.uuid.substring(0, 4);
                            
                            // Выводим ТОЛЬКО если данные отличаются от предыдущих
                            if (lastValues[charId] !== hex) {
                                lastValues[charId] = hex;
                                log(`КАНАЛ ${charId} ИЗМЕНИЛСЯ: ${hex}`, true);
                                
                                // Если это не статика и экран включен - подаем короткий звук
                                beep();
                            }
                        });
                        log(`Слушаю канал ${char.uuid.substring(0,4)}`);
                    } catch(e) {
                        log(`Ошибка на канале ${char.uuid.substring(0,4)}`);
                    }
                }
            }
            log("--- СКАНЕР ЗАПУЩЕН. Спровоцируй Warning Light! ---");

        } catch (error) {
            log("ОШИБКА: " + error);
        }
    };

    function beep() {
        const ctx = new AudioContext();
        const osc = ctx.createOscillator();
        osc.connect(ctx.destination);
        osc.frequency.value = 440;
        osc.start();
        osc.stop(ctx.currentTime + 0.1);
    }
</script>
</body>
</html>
