<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Magene Radar V11 - FINAL</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #000; color: #fff; }
        #display { width: 100%; height: 180px; border-radius: 35px; display: flex; align-items: center; justify-content: center; background: #111; border: 5px solid #333; margin-bottom: 20px; }
        #log { text-align: left; height: 250px; overflow-y: auto; background: #050505; padding: 15px; font-size: 11px; color: #00ff00; border-radius: 15px; font-family: monospace; border: 1px solid #444; }
        button { width: 100%; padding: 25px; font-size: 22px; font-weight: bold; cursor: pointer; border-radius: 20px; border: none; background: #27ae60; color: #fff; }
    </style>
</head>
<body>
    <div id="display"><div id="statusText" style="font-size: 35px; font-weight: 900;">OFFLINE</div></div>
    <button id="startBtn">ЗАПУСТИТЬ РАДАР ⚡</button>
    <div id="log">Лог инициализации...<br></div>

<script>
    const logDiv = document.getElementById('log');
    const statusText = document.getElementById('statusText');
    const display = document.getElementById('display');
    const SERVICE_UUID = '8ce5cc01-0a4d-11e9-ab14-d663bd873d93';

    function log(msg) {
        logDiv.innerHTML += `> ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('startBtn').onclick = async () => {
        try {
            log("Поиск радара...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true, optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const chars = await service.getCharacteristics();
            log("Bluetooth OK!");

            // 1. СЛУШАЕМ ЭФИР
            for (let char of chars) {
                if (char.properties.notify) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => {
                        let hex = Array.from(new Uint8Array(e.target.value.buffer)).map(b => b.toString(16).padStart(2, '0')).join(' ');
                        if (hex !== "01 00 06" && !hex.startsWith("57 0a")) {
                            log(`!!! ОБЪЕКТ: ${hex}`);
                            statusText.innerText = "МАШИНА! 🚗";
                            display.style.background = "#c0392b";
                        } else if (hex === "01 00 06") {
                            statusText.innerText = "ЧИСТО ✅";
                            display.style.background = "#1a1a1a";
                        }
                    });
                }
            }

            // 2. ФИНАЛЬНАЯ ПОСЛЕДОВАТЕЛЬНОСТЬ (Включая 01 02 01 01)
            const steps = [
                [0x01, 0x01, 0x01],
                [0x01, 0x01, 0x02],
                [0x01, 0x01, 0x03],
                [0x05, 0x01, 0x02, 0x02, 0x01, 0x03, 0x0e],
                [0x05, 0x01, 0x03, 0x01, 0x01, 0x01, 0x03, 0x0f],
                [0x01, 0x02, 0x01, 0x01] // ТВОЯ НАХОДКА! Команда ПУСК
            ];

            for (let char of chars) {
                if (char.properties.write) {
                    for (let cmd of steps) {
                        await char.writeValue(new Uint8Array(cmd)).catch(()=>{});
                        log(`Команда [${cmd.join(',')}] отправлена`);
                        await new Promise(r => setTimeout(r, 400));
                    }
                }
            }

            log("РАДАР ЗАПУЩЕН! ЖДУ ЦЕЛЬ.");
            statusText.innerText = "READY";

        } catch (e) { log("Ошибка: " + e); }
    };
</script>
</body>
</html>
