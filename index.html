<!DOCTYPE html>
<html>
<head>
    <title>Magene Total Intercept</title>
    <meta charset="utf-8">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; padding: 15px; text-align: center; }
        #log { height: 500px; overflow-y: auto; text-align: left; background: #050505; padding: 10px; border: 1px solid #333; font-size: 11px; margin-top: 10px; }
        button { width: 100%; padding: 20px; background: #27ae60; color: #fff; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .new-channel { color: #ff9f43; font-weight: bold; }
    </style>
</head>
<body>
    <button id="start">ПОДКЛЮЧИТЬ И СКАНИРОВАТЬ ВСЕ СЕРВИСЫ</button>
    <div id="log">Нажми кнопку...</div>

<script>
    const logDiv = document.getElementById('log');
    function log(msg, color = "") {
        const div = document.createElement('div');
        if (color) div.className = color;
        div.innerText = `> ${msg}`;
        logDiv.appendChild(div);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    document.getElementById('start').onclick = async () => {
        try {
            log("Поиск устройства...");
            // Просим доступ ко ВСЕМУ
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [
                    '8ce5cc01-0a4d-11e9-ab14-d663bd873d93',
                    '8ce5cc02-0a4d-11e9-ab14-d663bd873d93',
                    '0000183a-0000-1000-8000-00805f9b34fb'
                ]
            });

            const server = await device.gatt.connect();
            log("Соединено. Запрашиваю список всех сервисов...");
            
            // Пытаемся получить вообще все доступные сервисы
            const services = await server.getPrimaryServices();
            log(`Найдено сервисов: ${services.length}`);

            for (let service of services) {
                log(`--- Сервис: ${service.uuid.substring(0,8)} ---`);
                const chars = await service.getCharacteristics();
                
                for (let char of chars) {
                    if (char.properties.notify || char.properties.indicate) {
                        try {
                            await char.startNotifications();
                            char.addEventListener('characteristicvaluechanged', (e) => {
                                let hex = Array.from(new Uint8Array(e.target.value.buffer))
                                               .map(b => b.toString(16).padStart(2, '0')).join(' ');
                                
                                // Игнорируем только совсем пустые пакеты
                                if (hex !== "00 00 00") {
                                    log(`КАНАЛ ${char.uuid.substring(0,4)}: ${hex}`, "new-channel");
                                }
                            });
                            log(`Подписан на ${char.uuid.substring(0,4)}`);
                        } catch(e) {
                            log(`Не удалось подписаться на ${char.uuid.substring(0,4)}`);
                        }
                    }
                }
            }
            log("Сканирование завершено. Провоцируй машину!");

        } catch (e) { log("ОШИБКА: " + e); }
    };
</script>
</body>
</html>
