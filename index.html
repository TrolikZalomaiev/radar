<!DOCTYPE html>
<html lang="ru">
<head>
    <title>Radar Monitor Pro</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; padding: 15px; background: #050505; color: #fff; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* Наш экранчик-индикатор */
        #displayNode {
            width: 100%;
            height: 180px;
            margin: 15px 0;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            border: 4px solid #333;
            transition: all 0.2s ease;
        }
        #statusText { font-size: 40px; font-weight: 900; letter-spacing: 2px; }
        #subStatus { font-size: 14px; margin-top: 10px; opacity: 0.7; font-family: monospace; }

        /* Состояния экрана */
        .state-clear { background: #062d19 !important; border-color: #2ecc71 !important; color: #2ecc71; }
        .state-warning { 
            background: #4d0000 !important; border-color: #ff4d4d !important; color: #ff4d4d;
            animation: pulse-bg 0.5s infinite;
        }
        @keyframes pulse-bg { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        button { 
            width: 100%; padding: 18px; font-size: 16px; font-weight: bold;
            cursor: pointer; border-radius: 12px; border: none; margin-bottom: 10px;
            text-transform: uppercase;
        }
        #unlock { background: #444; color: white; }
        #connect { background: #007bff; color: white; }
        #log { 
            text-align: left; height: 120px; overflow-y: auto; 
            background: #000; padding: 10px; font-size: 11px; 
            border: 1px solid #222; color: #0f0; border-radius: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin-bottom:5px;">RADAR INTERFACE</h2>
    
    <div id="displayNode">
        <div id="statusText">OFFLINE</div>
        <div id="subStatus">Ожидание подключения...</div>
    </div>

    <button id="unlock">1. Включить звук</button>
    <button id="connect">2. Подключить радар</button>

    <div id="log">Лог сигналов:<br></div>
</div>

<script>
    const connectBtn = document.getElementById('connect');
    const unlockBtn = document.getElementById('unlock');
    const display = document.getElementById('displayNode');
    const statusText = document.getElementById('statusText');
    const subStatus = document.getElementById('subStatus');
    const logDiv = document.getElementById('log');

    let audioCtx = null;
    const SERVICE_UUID = '8ce5cc01-0a4d-11e9-ab14-d663bd873d93';

    function log(msg) {
        logDiv.innerHTML += `[${new Date().toLocaleTimeString().split(' ')[0]}] ${msg}<br>`;
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    function playAlert(isCritical) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        
        if (isCritical) {
            osc.type = 'sawtooth';
            osc.frequency.value = 1200;
            gain.gain.setValueAtTime(0.8, audioCtx.currentTime);
            if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
        } else {
            osc.type = 'sine';
            osc.frequency.value = 800;
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime); 
        }
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.4);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    unlockBtn.onclick = () => {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        unlockBtn.style.background = "#2ecc71";
        unlockBtn.innerText = "Звук готов ✅";
        statusText.innerText = "READY";
        log("Аудиосистема запущена");
    };

    connectBtn.onclick = async () => {
        try {
            log("Поиск радара...");
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true,
                optionalServices: [SERVICE_UUID]
            });

            const server = await device.gatt.connect();
            log("Подключено: " + device.name);
            playAlert(true);

            const service = await server.getPrimaryService(SERVICE_UUID);
            const chars = await service.getCharacteristics();

            for (let char of chars) {
                if (char.properties.notify) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => {
                        const data = e.target.value;
                        let hex = "";
                        let carFound = false;
                        let triggerByte = 0;

                        for (let i = 0; i < data.byteLength; i++) {
                            let v = data.getUint8(i);
                            hex += v.toString(16).padStart(2, '0') + " ";
                            // Проверяем все байты кроме первого служебного
                            if (i > 0 && v > 0) {
                                carFound = true;
                                triggerByte = v;
                            }
                        }

                        if (carFound) {
                            display.className = "state-warning";
                            statusText.innerText = "МАШИНА";
                            subStatus.innerText = "Сигнал: " + hex;
                            playAlert(true);
                        } else {
                            display.className = "state-clear";
                            statusText.innerText = "ЧИСТО";
                            subStatus.innerText = "Поток: " + hex;
                        }
                    });
                }
            }
        } catch (e) { log("Ошибка: " + e.message); }
    };
</script>
</body>
</html>
