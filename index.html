<!DOCTYPE html>
<html>
<head>
    <title>Magene Warning Detector</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; }
        #display { height: 200px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; border-radius: 20px; margin: 20px; border: 5px solid #333; transition: 0.3s; }
        .clear { background: #1a1a1a; color: #444; }
        .alarm { background: #e74c3c; color: #fff; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
        #log { text-align: left; height: 300px; overflow-y: auto; background: #111; padding: 10px; font-family: monospace; font-size: 12px; color: #2ecc71; border: 1px solid #333; }
        button { width: 90%; padding: 20px; font-size: 18px; background: #3498db; color: #fff; border: none; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="display" class="clear">ОЖИДАНИЕ...</div>
    <button id="btn">ПОДКЛЮЧИТЬ РАДАР</button>
    <div id="log">Лог сигналов фонаря:<br></div>

<script>
    const logDiv = document.getElementById('log');
    const display = document.getElementById('display');
    const SERVICE_UUID = '8ce5cc01-0a4d-11e9-ab14-d663bd873d93';
    let knownModes = ["06", "05", "01", "00"]; // Режимы, на которые мы НЕ орем (добавь свои, если увидишь в логе)

    function log(msg) { logDiv.innerHTML += `> ${msg}<br>`; logDiv.scrollTop = logDiv.scrollHeight; }

    document.getElementById('btn').onclick = async () => {
        try {
            const device = await navigator.bluetooth.requestDevice({
                acceptAllDevices: true, optionalServices: [SERVICE_UUID]
            });
            const server = await device.gatt.connect();
            const service = await server.getPrimaryService(SERVICE_UUID);
            const chars = await service.getCharacteristics();

            for (let char of chars) {
                if (char.properties.notify) {
                    await char.startNotifications();
                    char.addEventListener('characteristicvaluechanged', (e) => {
                        let hex = Array.from(new Uint8Array(e.target.value.buffer)).map(b => b.toString(16).padStart(2, '0')).join(' ');
                        
                        if (hex.startsWith("57 0a")) {
                            let currentMode = hex.split(' ')[3]; // Четвертый байт - это режим
                            log("Статус фонаря: " + hex);

                            // ПРОВЕРКА: Если режим не из списка "спокойных" - это ТРЕВОГА!
                            if (!knownModes.includes(currentMode)) {
                                display.className = "alarm";
                                display.innerText = "МАШИНА! (Warning Light)";
                                playSound();
                            } else {
                                display.className = "clear";
                                display.innerText = "Чисто (Режим " + currentMode + ")";
                            }
                        }
                    });
                }
            }
            log("Система запущена. Проверь Warning Light!");
        } catch (e) { log("Ошибка: " + e); }
    };

    function playSound() {
        let ctx = new (window.AudioContext || window.webkitAudioContext)();
        let osc = ctx.createOscillator();
        let gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.1, ctx.currentTime);
        osc.start();
        osc.stop(ctx.currentTime + 0.5);
    }
</script>
</body>
</html>
